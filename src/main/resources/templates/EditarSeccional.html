<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/Layout :: head"></head>
<body>
<nav th:replace="layout/Layout :: navbar"></nav>

<div class="container mt-4">
    <form th:object="${objSeccional}" th:action="@{/editarSeccionalBy/{id}(id=${objSeccional.idSeleccional})}" method="post">
        <input type="hidden" th:field="*{idSeleccional}"/>

        <fieldset>
            <legend>Formulario Seccional</legend>

            <div class="mb-3">
                <label for="nombreform" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombreform"
                       th:field="*{nombre}" placeholder="Ej: Seccional Centro">
            </div>

            <div class="mb-3">
                <label for="direccionform" class="form-label">Direccion</label>
                <input type="text" class="form-control" id="direccionform"
                       th:field="*{direccion}" placeholder="Ej: Carrera 5 # 10-20">
            </div>

            <div class="mb-3">
                <label for="universidad" class="form-label">Universidad</label>
                <select class="form-select" id="universidad" name="idUniversidad" required>
                    <option value="" disabled>Seleccione una universidad</option>
                    <option th:each="u : ${universidades}"
                            th:value="${u.idUniversidad}"
                            th:text="${u.nombre}"
                            th:selected="${objSeccional.universidad != null and objSeccional.universidad.idUniversidad == u.idUniversidad}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Actualizar</button>
        </fieldset>
    </form>

    <br>
    <a th:href="@{/listarSeccionales}" class="btn btn-danger">Cancelar</a>
</div>

<footer th:replace="layout/Layout :: footer"></footer>
</body>
</html>
