<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="Layout/Layout:: head "> </head>
<body>
<nav th:replace="Layout/Layout:: navbar"></nav>

<h1 class="page-content" th:text="${titulo}"></h1>

<div class="container" style="margin-top: 10px; padding: 5px; width: 80%;">
    <table id="tablex" class="table table-striped table-bordered">
        <thead class ="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Dirección</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="seccional:${seccional}">
            <td th:text="${seccional.idSeleccional}"></td>
            <td th:text="${seccional.nombre}"></td>
            <td th:text="${seccional.direccion}"></td>

        </tr>
        </tbody>

    </table>

    <a th:href="@{/crearSeleccionales}" class="btn btn-primary"> Registrar Seccionales </a>

</div>

<footer th:replace="layout/layout:: footer "> </footer>
</body>
</html>
