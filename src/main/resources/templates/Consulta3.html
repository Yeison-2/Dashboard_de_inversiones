<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="Layout/Layout:: head "> </head>
<body>
<nav th:replace="Layout/Layout:: navbar"></nav>

<h1 class="page-content" th:text="${titulo}"></h1>

<div class="container" style="margin-top: 10px; padding: 5px; width: 80%;">
    <table id="tablex" class="table table-striped table-bordered">
        <thead class ="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>NIT</th>
            <th>Estado</th>
            <th>Descripcion</th>

            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="universidad:${universidad}">
            <td th:text="${universidad.idUniversidad}"></td>
            <td th:text="${universidad.nombre}"></td>
            <td th:text="${universidad.nit}"></td>
            <td th:text="${universidad.estado}"></td>
            <td th:text="${universidad.descripcion}"></td>
            <td class="text-center">
                <a class="btn btn-danger btn-xs" th:href="@{/eliminarUniversidadBy/} + ${universidad.idUniversidad}" onclick="return confirm('¿Estas seguro de eliminar el registro?')" th:text="Eliminar"></a>
            </td>

            <td class="text-center">
                <a class="btn btn-info btn-xs" th:href="@{/editarUniversidadBy/{id}(id = ${universidad.idUniversidad})}" th:text="Editar"></a>
            </td>
        </tr>
        </tbody>

    </table>

    <a th:href="@{/crearUniversidades}" class="btn btn-primary"> Registrar Universidades </a>

</div>

<footer th:replace="layout/layout:: footer "> </footer>
</body>
</html>
