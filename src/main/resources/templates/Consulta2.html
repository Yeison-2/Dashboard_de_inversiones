<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout/Layout :: head"></head>
<body>
<nav th:replace="layout/Layout :: navbar"></nav>

<h1 class="page-content" th:text="${titulo}"></h1>

<div class="container" style="margin-top: 10px; padding: 5px; width: 80%;">
    <table id="tablex" class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Direccion</th>
            <th>Universidad</th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="seccional : ${seccionales}">
            <td th:text="${seccional.idSeleccional}"></td>
            <td th:text="${seccional.nombre}"></td>
            <td th:text="${seccional.direccion}"></td>
            <td th:text="${seccional.universidad != null ? seccional.universidad.nombre : ''}"></td>
            <td class="text-center">
                <a class="btn btn-danger btn-sm"
                   th:href="@{/eliminarSeccionalBy/{id}(id=${seccional.idSeleccional})}"
                   onclick="return confirm('¿Esta seguro de eliminar el registro?')"
                   th:text="Eliminar"></a>
            </td>
            <td class="text-center">
                <a class="btn btn-info btn-sm"
                   th:href="@{/editarSeccionalBy/{id}(id=${seccional.idSeleccional})}"
                   th:text="Editar"></a>
            </td>
        </tr>
        </tbody>

    </table>

    <a th:href="@{/crearSeleccionales}" class="btn btn-primary">Registrar Seccional</a>

</div>

<footer th:replace="layout/Layout :: footer"></footer>
</body>
</html>
