<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/Layout :: head"></head>
<body>
<nav th:replace="layout/Layout :: navbar"></nav>

<h1 class="page-content" th:text="${titulo}"></h1>

<div class="container" style="margin: 10px; padding: 5px; width: 80%">
    <table id="tablex" class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Numero</th>
            <th>Tipo</th>
            <th>Seccional</th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="telefono : ${telefonos}">
            <td th:text="${telefono.idTelefono}"></td>
            <td th:text="${telefono.numero}"></td>
            <td th:text="${telefono.tipo}"></td>
            <td th:text="${telefono.seleccional != null ? telefono.seleccional.nombre : ''}"></td>
            <td class="text-center">
                <a class="btn btn-danger btn-sm"
                   th:href="@{/EliminarTelefonoBy/{id}(id=${telefono.idTelefono})}"
                   onclick="return confirm('¿Esta seguro de eliminar el registro?')"
                   th:text="Eliminar"></a>
            </td>
            <td class="text-center">
                <a class="btn btn-info btn-sm"
                   th:href="@{/EditarTelefonoBy/{id}(id=${telefono.idTelefono})}"
                   th:text="Editar"></a>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/CrearTelefono}" class="btn btn-primary mt-3">Registrar Telefono</a>
</div>

<footer th:replace="layout/Layout :: footer"></footer>
</body>
</html>
