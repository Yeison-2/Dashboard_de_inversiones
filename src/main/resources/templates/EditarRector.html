<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/Layout :: head"></head>
<body>
<nav th:replace="layout/Layout :: navbar"></nav>

<div class="container mt-4">
  <form th:object="${objRector}" th:action="@{/EditarRectorBy/{id}(id=${objRector.idDirector})}" method="post">
    <input type="hidden" th:field="*{idDirector}"/>

    <fieldset>
      <legend>Formulario Rector</legend>

      <div class="mb-3">
        <label for="primApellido" class="form-label">Primer Apellido</label>
        <input type="text" class="form-control" id="primApellido"
               th:field="*{primerapellido}" placeholder="Ej: Pérez">
      </div>

      <div class="mb-3">
        <label for="segApellido" class="form-label">Segundo Apellido</label>
        <input type="text" class="form-control" id="segApellido"
               th:field="*{segundoapellido}" placeholder="Ej: Gómez">
      </div>

      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre"
               th:field="*{nombre}" placeholder="Ej: Juan">
      </div>

      <div class="mb-3">
        <label for="numDocumento" class="form-label">Número Documento</label>
        <input type="text" class="form-control" id="numDocumento"
               th:field="*{num_documento}" placeholder="Ej: 1234567890">
      </div>

      <div class="mb-3">
        <label for="tipDocumento" class="form-label">Tipo Documento</label>
        <select class="form-select" id="tipDocumento" th:field="*{tipo}">
          <option value="CC">Cédula de Ciudadanía</option>
          <option value="TI">Tarjeta de Identidad</option>
          <option value="CE">Cédula de Extranjería</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
        <input type="date" class="form-control" id="fechaNacimiento"
               th:field="*{fechaNacimiento}">
      </div>

      <div class="mb-3">
        <label for="universidad" class="form-label">Universidad</label>
        <select class="form-select" id="universidad" name="idUniversidad" required>
          <option value="" disabled>Seleccione una universidad</option>
          <option th:each="u : ${universidades}"
                  th:value="${u.idUniversidad}"
                  th:text="${u.rector == null ? u.nombre : u.nombre + ' (ya tiene rector)'}"
                  th:disabled="${u.rector != null and (objRector.universidad == null or objRector.universidad.idUniversidad != u.idUniversidad)}"
                  th:selected="${objRector.universidad != null and objRector.universidad.idUniversidad == u.idUniversidad}">
          </option>
        </select>
        <small class="text-muted">Las universidades con rector asignado no están disponibles.</small>
      </div>

      <button type="submit" class="btn btn-primary">Actualizar</button>
    </fieldset>
  </form>

  <br>
  <a th:href="@{/ListarRector}" class="btn btn-danger">Cancelar</a>
</div>

<footer th:replace="layout/Layout :: footer"></footer>
</body>
</html>
