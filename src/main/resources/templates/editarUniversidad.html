<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="Layout/Layout:: head "> </head>
<body>
<nav th:replace="Layout/Layout:: navbar"></nav>

<h1 class="page-content text-center" th:text="${titulo}"></h1>

<div class ="container mt-4">


    <div>
        <form th:object="${universidadActualizar}" th:action="@{/editarUniversidadBy/{id} (id = ${universidadActualizar.idUniversidad})}" method="post">
            <div class="mb-3">
                <label for="nombreform" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombreform" aria-describedby="nombreHelp" th:field="*{nombre}" name="nombre">
                <div id="nombreHelp" class="form-text">Ejm. Juan de Castellanos</div>
            </div>
            <div class="mb-3">
                <label for="nitform" class="form-label">Nit</label>
                <input type="text" class="form-control" id="nitform" th:field="*{nit}" name="nit">
            </div>
            <div class="mb-3">
                <label for="estadoform" class="form-label">Estado</label>
                <input type="text" class="form-control" id="estadoform" th:field="*{estado}" name="estado">
            </div>
            <div class="mb-3">
                <label for="descripcionform" class="form-label">Descripción</label>
                <input type="text" class="form-control" id="descripcionform" th:field="*{descripcion}" name="descripcion">
            </div>
            <button type="submit" class="btn btn-primary">Actualizar Universidad</button>
            <a th:href="@{/ListarUniversidades}" class="btn btn-danger">Cancelar</a>
        </form>

    </div>
</div>
</body>
</html>
