<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${proyecto.id == null ? 'Nuevo proyecto' : 'Editar proyecto'}">Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background: linear-gradient(90deg,#0f766e,#155e75);">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">Inventario de inversion</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container pb-5" style="max-width:720px;">
    <h1 class="h3 mb-3" th:text="${proyecto.id == null ? 'Registrar proyecto' : 'Editar proyecto'}">Formulario</h1>

    <form th:action="@{/gestion/proyecto}" method="post" class="card shadow-sm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="id" th:value="${proyecto.id}"/>

        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Nombre del proyecto</label>
                <input class="form-control" name="nombreProyecto" required maxlength="80"
                       th:value="${proyecto.nombreProyecto}"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha de registro del proyecto</label>
                <input type="date" class="form-control" name="fechaRegistro" required
                       th:value="${proyecto.fechaRegistro != null}
                          ? ${#temporals.format(proyecto.fechaRegistro, 'yyyy-MM-dd')} : ''"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select class="form-select" name="estado" required>
                    <option th:each="e : ${estados}" th:value="${e.name()}" th:text="${e}"
                            th:selected="${proyecto.estado != null && proyecto.estado == e}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo</label>
                <input class="form-control" name="tipo" required maxlength="80"
                       placeholder="Ej. infraestructura vial"
                       th:value="${proyecto.tipo}"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Responsable</label>
                <input class="form-control" name="responsable" required maxlength="80"
                       th:value="${proyecto.responsable}"/>
            </div>
            <div class="mb-3">
                <label class="form-label">Sectorial</label>
                <select class="form-select" name="sectorialId" required th:if="${esAdmin}">
                    <option disabled th:selected="${proyecto.sectorial == null}" value="">Elija…</option>
                    <option th:each="s : ${sectoriales}" th:value="${s.id}" th:text="${s.nombre}"
                            th:selected="${proyecto.sectorial != null && proyecto.sectorial.id == s.id}"></option>
                </select>
                <div th:unless="${esAdmin}">
                    <select class="form-select" disabled>
                        <option th:each="s : ${sectoriales}" th:value="${s.id}" th:text="${s.nombre}"
                                th:selected="${(proyecto.sectorial != null && proyecto.sectorial.id == s.id) || (sectorialIdFija != null && sectorialIdFija == s.id)}"></option>
                    </select>
                    <input type="hidden" name="sectorialId" th:value="${sectorialIdFija}"/>
                    <div class="form-text">Tu sectorial está definida por tu rol y no puede modificarse.</div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Municipio</label>
                <select class="form-select" name="municipioId" required>
                    <option disabled th:selected="${proyecto.municipio == null}" value="">Elija…</option>
                    <option th:each="m : ${municipios}"
                            th:value="${m.id}"
                            th:text="${m.nombre + ' — ' + m.departamento}"
                            th:selected="${proyecto.municipio != null && proyecto.municipio.id == m.id}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
