<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/Layout :: head"></head>
<body>
<nav th:replace="layout/Layout :: navbar"></nav>

<h1 class="page-content" th:text="${titulo}"></h1>

<div class="container" style="margin: 10px; padding: 5px; width: 80%">
    <table id="tablex" class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Primer Apellido</th>
            <th>Segundo Apellido</th>
            <th>Nombre</th>
            <th>Num. Documento</th>
            <th>Tipo Documento</th>
            <th>Fecha Nacimiento</th>
            <th>Universidad</th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="rector : ${rectores}">
            <td th:text="${rector.idDirector}"></td>
            <td th:text="${rector.primerapellido}"></td>
            <td th:text="${rector.segundoapellido}"></td>
            <td th:text="${rector.nombre}"></td>
            <td th:text="${rector.num_documento}"></td>
            <td th:text="${rector.tipo}"></td>
            <td th:text="${rector.fechaNacimiento}"></td>
            <td th:text="${rector.universidad != null ? rector.universidad.nombre : ''}"></td>
            <td class="text-center">
                <a class="btn btn-danger btn-sm"
                   th:href="@{/EliminarRectorBy/{id}(id=${rector.idDirector})}"
                   onclick="return confirm('¿Está seguro de eliminar el registro?')"
                   th:text="Eliminar"></a>

            </td>
            <td class="text-center">
                <a class="btn btn-info btn-sm"
                   th:href="@{/EditarRectorBy/{id}(id=${rector.idDirector})}"
                   th:text="Editar"></a>

            </td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/CrearRector}" class="btn btn-primary mt-3">Registrar Rector</a>
</div>

<footer th:replace="layout/Layout :: footer"></footer>
</body>
</html>
